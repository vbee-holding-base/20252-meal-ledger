name: NodeJS with Webpack

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      HUSKY: 0 

    strategy:
      matrix:
        node-version: [22.x]

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}

    # Step build Backend
    - name: Build Backend
      working-directory: ./backend
      run: |
        npm install
        npm run build # (Hoặc npx webpack... tùy cấu hình của bạn)

    # Step build Frontend
    - name: Build Frontend
      working-directory: ./frontend
      run: |
        rm -f package-lock.json
        npm install
        npm run build
